<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>make software</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lacquer&display=block" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Departure Mono';
      src: url('fonts/DepartureMono-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: oklch(50.58% .2886 264.84);
      --bg: #fbfbfb;
      --mono: 'Departure Mono', monospace;
      --display: 'Lacquer', cursive;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--blue);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loader ──────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100000;
      transition: opacity 0.35s ease;
    }
    #loader.done {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Grid ────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(oklch(50.58% .2886 264.84 / 0.055) 1px, transparent 1px),
        linear-gradient(90deg, oklch(50.58% .2886 264.84 / 0.055) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Noise overlay ───────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Page shell ──────────────────────────────── */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 1.75rem 2.25rem;
      z-index: 10;
    }

    /* ── Body ────────────────────────────────────── */
    .body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.75rem;
    }

    /* ── Title + glitch ──────────────────────────── */
    h1 {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(2.8rem, 10.5vw, 8rem);
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .word {
      display: block;
    }

.cursor {
      display: inline-block;
      width: 0.55em;
      height: 0.08em;
      background: currentColor;
      margin-left: 0.04em;
      vertical-align: -0.12em;
      animation: blink 0.25s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── Manifesto ───────────────────────────────── */
    .manifesto {
      font-family: var(--mono);
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      line-height: 2.0;
      opacity: 0.6;
      -webkit-text-stroke: 0.25px currentColor;
    }

    /* ── Bottom bar ──────────────────────────────── */
    .bottombar {
      flex-shrink: 0;
      border-top: 1px solid currentColor;
      padding-top: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    /* ── Vienna + flag ───────────────────────────── */
    .vienna-wrap {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .flag {
      width: 24px;
      height: 15px;
      flex-shrink: 0;
      background: linear-gradient(
        to bottom,
        currentColor 0%,
        currentColor 33.33%,
        var(--bg)    33.33%,
        var(--bg)    66.66%,
        currentColor 66.66%,
        currentColor 100%
      );
      outline: 0.5px solid currentColor;
    }

    /* ── Mobile ──────────────────────────────────── */
    @media (max-width: 640px) {
      .page {
        padding: 1.25rem 1.25rem;
      }

      .body {
        gap: 1.25rem;
      }

      h1 {
        font-size: clamp(2.8rem, 16vw, 5rem);
      }

      .manifesto {
        font-size: 0.95rem;
        line-height: 1.75;
      }

      .manifesto br {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div id="loader"></div>

  <div class="page">
    <div class="body">
      <h1>
        <span class="word">make</span>
        <span class="word">software<span class="cursor"></span></span>
      </h1>
      <p class="manifesto">
        A community for creatives and tinkerers.<br>
        We use AI to make software, unlock a brighter future,<br>
        and build the human connections that matter.<br>
        Made by builders, for builders.
      </p>
    </div>

    <footer class="bottombar">
      <span>Coming soon</span>
      <div class="vienna-wrap">
        <span>Vienna</span>
        <div class="flag" role="img" aria-label="Austria flag"></div>
      </div>
    </footer>
  </div>

  <script>
    function initLeetGlitch() {
      const leet = { a:'4', e:'3', i:'1', o:'0', t:'7', s:'5', b:'8', l:'1', g:'9', z:'2' };
      const manifesto = document.querySelector('.manifesto');

      function processNode(node) {
        if (node.nodeType === 3) {
          const frag = document.createDocumentFragment();
          for (const char of node.textContent) {
            const alt = leet[char.toLowerCase()];
            if (alt) {
              const span = document.createElement('span');
              span.dataset.orig = char;
              span.dataset.alt  = alt;
              span.textContent  = char;
              frag.appendChild(span);
            } else {
              frag.appendChild(document.createTextNode(char));
            }
          }
          node.parentNode.replaceChild(frag, node);
        } else if (node.nodeType === 1 && node.tagName !== 'BR') {
          [...node.childNodes].forEach(processNode);
        }
      }

      [...manifesto.childNodes].forEach(processNode);

      const spans = [...manifesto.querySelectorAll('span[data-orig]')];

      // 200ms interval, 0.8% chance → ~25s average between glitches per character
      setInterval(() => {
        spans.forEach(span => {
          if (!span.dataset.glitched && Math.random() < 0.008) {
            span.dataset.glitched = '1';
            span.textContent = span.dataset.alt;
            setTimeout(() => {
              span.textContent = span.dataset.orig;
              delete span.dataset.glitched;
            }, 100 + Math.random() * 200);
          }
        });
      }, 200);
    }

    Promise.race([
      document.fonts.ready,
      new Promise(r => setTimeout(r, 3000))
    ]).then(() => {
      const loader = document.getElementById('loader');
      loader.classList.add('done');
      loader.addEventListener('transitionend', () => loader.remove(), { once: true });
      initLeetGlitch();
    });
  </script>

</body>
</html>
